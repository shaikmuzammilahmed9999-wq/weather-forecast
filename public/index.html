<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Matrix | Precision Forecast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #8A2BE2;
            --secondary: #00D4FF;
            --accent: #FF2A6D;
            --dark: #0C0E27;
            --light: #F0F4FF;
            --card-bg: rgba(16, 18, 47, 0.7);
            --transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--dark), #1a1c3d);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--light);
        }

        .logo i {
            color: var(--secondary);
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: var(--light);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-box:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--secondary);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .search-btn {
            position: absolute;
            right: 5px;
            top: 5px;
            background: var(--secondary);
            color: var(--dark);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-btn:hover {
            background: var(--accent);
            transform: rotate(90deg);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .weather-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
            animation: fadeInUp 1s ease-out;
        }

        .weather-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .location-info {
            margin-bottom: 30px;
        }

        .city-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--secondary), var(--accent));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-time {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .weather-visual {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 40px 0;
        }

        .temperature {
            font-size: 5rem;
            font-weight: 700;
            position: relative;
        }

        .temperature::after {
            content: "°C";
            font-size: 2rem;
            position: absolute;
            top: 10px;
            right: -30px;
        }

        .weather-icon {
            font-size: 6rem;
            color: var(--secondary);
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
            animation: float 6s ease-in-out infinite;
        }

        .weather-description {
            font-size: 1.5rem;
            text-transform: capitalize;
            margin-top: 10px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        .detail-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .detail-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: var(--secondary);
        }

        .detail-info h3 {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .detail-info p {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .forecast-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .forecast-day {
            font-size: 1rem;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 10px 0;
            color: var(--secondary);
        }

        .forecast-temp {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .forecast-sub {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
        }

        .map-container {
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #weather-map {
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }

        .map-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(16, 18, 47, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            max-width: 200px;
        }

        .map-overlay h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--secondary);
        }

        .map-overlay p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        .map-controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .map-btn {
            width: 40px;
            height: 40px;
            background: rgba(16, 18, 47, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .map-btn:hover {
            background: var(--secondary);
            color: var(--dark);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .error-message {
            background: rgba(255, 42, 109, 0.2);
            border: 1px solid var(--accent);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            animation: shake 0.5s ease-in-out;
        }

        .particle-network {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        /* Custom Leaflet Styles */
        .leaflet-container {
            background: #1a1c3d;
            border-radius: 20px;
        }

        .leaflet-popup-content-wrapper {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: var(--light);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .leaflet-popup-tip {
            background: var(--card-bg);
        }

        .custom-marker {
            background: var(--secondary);
            border: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.7);
            animation: pulse 2s infinite;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(0, 212, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0);
            }
        }

        /* Responsive Design */
        @media (max-width: 1100px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .forecast-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
            }
            
            .search-container {
                width: 100%;
            }
            
            .temperature {
                font-size: 4rem;
            }
            
            .weather-icon {
                font-size: 4rem;
            }
            
            .forecast-container {
                grid-template-columns: 1fr;
            }
            
            .map-overlay {
                max-width: 150px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="particle-network"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-cloud-moon-rain"></i>
                <span>Weather Matrix</span>
            </div>
            <div class="search-container">
                <input type="text" class="search-box" id="location-input" placeholder="Search for a city, region, or country...">
                <button class="search-btn" id="search-btn">
                    <i class="fas fa-search-location"></i>
                </button>
            </div>
        </header>

        <div class="main-content">
            <div class="weather-card">
                <div class="location-info">
                    <h1 class="city-name" id="city-name">San Francisco</h1>
                    <p class="date-time" id="date-time">Monday, October 10, 2023 | 14:30 PM</p>
                </div>
                
                <div class="weather-visual">
                    <div>
                        <h2 class="temperature" id="temperature">22</h2>
                        <p class="weather-description" id="description">Partly Cloudy</p>
                    </div>
                    <div>
                        <i class="fas fa-cloud-sun weather-icon" id="weather-icon"></i>
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-wind"></i>
                        </div>
                        <div class="detail-info">
                            <h3>Wind Speed</h3>
                            <p id="wind-speed">12 km/h</p>
                        </div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">
                            <i class="fas fa-tint"></i>
                        </div>
                        <div class="detail-info">
                            <h3>Humidity</h3>
                            <p id="humidity">65%</p>
                        </div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">
